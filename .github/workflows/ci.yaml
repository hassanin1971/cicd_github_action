name: CI pipline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  app_env: production
  log_level: debug      
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RUNNER_DEBUG: 1
    steps:
      - name: print hello world
        run: echo "Hello world"
      - name: show current time
        run: date
      - name: list files in current directory
        run: ls -la
      - name: print workflow event
        run: echo "${{ toJson(github.event_name )}}"
      - name: refrence github context
        run: echo "The repository is ${{ github.repository }}"
      - name: show github workspace
        run: echo "The github workspace is ${{ github.workspace }}"
      - name: show github os
        run: echo "The github os is ${{ runner.os }}"
      - name: print info veriables
        run: echo "The app env is ${{ env.app_env }} and log level is ${{ env.log_level }}"
      - name: print secrest values
        run: echo "The secrest value is ${{ secrets.SECRET_MESSAGE }}"  
